<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habitación Marinet | Diorama</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/project-individual.css">
</head>

<body>

<div class="top-nav">
  <a href="../index.html" class="nav-pill">Home</a>
  <a href="../index.html#about" class="nav-pill">Sobre mí</a>
  <a href="../projects.html" class="nav-pill home">Todos los proyectos</a>
</div>

<header class="project-header">
  <h1>Diorama — Habitación Marinet</h1>
  <div class="project-meta">
    Blender · Lighting · Composición · Props · Diorama
  </div>

  <!-- ===== DESCRIPCIÓN ===== -->
  <section class="project-description">
    <h2>Sobre el proyecto</h2>
    <p>
    Diorama de habitación, referenciado en la serie de Ladybug. Modelado, texturizado e iluminado en Blender.  
    </p>
  </section>
</header>

<main class="project-container">

<!-- ===== PANEL DÍA / NOCHE ===== -->
<section class="interactive-grid">

<div class="interactive-card">

  <div class="media-wrapper" onclick="openModalVideo('roomVideo')">
    <video id="roomVideo" autoplay loop muted>
      <source src="assets/images/thumbnails/render_diorama_lady.png" type="video/mp4">
    </video>
  </div>

  <div class="media-caption">
    Iluminación diurna y nocturna del diorama.
  </div>

  <div class="switch-row">
    <span>Día / Noche</span>
    <div class="toggle" onclick="toggleRoom(this)"></div>
  </div>

</div>

</section>


<!-- ===== GALERÍA DE PROPS ===== -->
<section class="gallery">

<figure>
  <img src="../media/marinet_bed.jpg" onclick="openModalImage(this.src)">
  <figcaption>Descripción...</figcaption>
</figure>

<figure>
  <img src="../media/marinet_desk.jpg" onclick="openModalImage(this.src)">
  <figcaption>Escritorio y objetos personales.</figcaption>
</figure>

<figure>
  <img src="../media/marinet_lamp.jpg" onclick="openModalImage(this.src)">
  <figcaption>Malla</figcaption>
</figure>

<figure>
  <img src="../media/marinet_window.jpg" onclick="openModalImage(this.src)">
  <figcaption>Referencia</figcaption>
</figure>

</section>

</main>

<!-- MODAL GLOBAL -->
<div id="modal">
  <span id="modal-close" onclick="closeModal()">✖</span>
  <div id="modal-content"></div>
</div>

<script>
function toggleRoom(el){
  const video = document.getElementById("roomVideo");

  if(el.classList.contains("active")){
    el.classList.remove("active");
    video.src="assets/images/thumbnails/render_diorama_lady.png";
  } else {
    el.classList.add("active");
    video.src="../media/marinet_night.mp4";
  }
  video.play();
}

function openModalVideo(id){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");

  const video = document.getElementById(id).cloneNode(true);
  video.controls = true;
  video.muted = false;

  content.innerHTML = "";
  content.appendChild(video);
  modal.style.display="flex";
}

function openModalImage(src){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");
  content.innerHTML = `<img src="${src}">`;
  modal.style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
